<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Reserva confirmada · Fun Republik</title>

<style>
body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
margin:0;
background:#0b0f19;
color:#eef2ff;
}

.wrap{
max-width:720px;
margin:0 auto;
padding:20px;
}

.card{
background:#111827;
border:1px solid #1f2937;
border-radius:16px;
padding:22px;
box-shadow:0 10px 30px rgba(0,0,0,.25);
}

h1{
margin:0 0 6px;
font-size:24px;
}

p{
margin:0 0 16px;
color:#c7d2fe;
}

.success{
display:inline-block;
padding:6px 10px;
border-radius:999px;
background:#052e1b;
border:1px solid #16a34a;
color:#bbf7d0;
font-size:12px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-top:14px;
}

.item{
background:#0b1220;
border:1px solid #334155;
border-radius:12px;
padding:12px;
}

.label{
font-size:12px;
color:#94a3b8;
margin-bottom:4px;
}

.value{
font-size:15px;
font-weight:600;
}

.priceBox{
margin-top:16px;
padding:16px;
border-radius:14px;
border:1px solid #334155;
background:#0b1220;
text-align:center;
}

.priceValue{
font-size:30px;
font-weight:700;
}

.btn{
display:inline-block;
margin-top:18px;
padding:12px 18px;
border-radius:12px;
background:#4f46e5;
color:white;
text-decoration:none;
font-weight:600;
}

.footer{
margin-top:14px;
font-size:12px;
color:#94a3b8;
}

@media(max-width:640px){
.grid{grid-template-columns:1fr;}
}
</style>
</head>

<body>

<div class="wrap">

<div class="card">

<div class="success">
Reserva confirmada
</div>

<h1>¡Tu barco está reservado! 🛥️</h1>

<p>
Hemos registrado tu reserva correctamente.  
En breve recibirás la confirmación por WhatsApp.
</p>

<div class="grid">

<div class="item">
<div class="label">Nombre</div>
<div id="name" class="value"></div>
</div>

<div class="item">
<div class="label">Teléfono</div>
<div id="phone" class="value"></div>
</div>

<div class="item">
<div class="label">Día</div>
<div id="date" class="value"></div>
</div>

<div class="item">
<div class="label">Hora</div>
<div id="time" class="value"></div>
</div>

<div class="item">
<div class="label">Duración</div>
<div id="duration" class="value"></div>
</div>

<div class="item">
<div class="label">Barcos</div>
<div id="boats" class="value"></div>
</div>

<div class="item">
<div class="label">Personas</div>
<div id="pax" class="value"></div>
</div>

<div class="item">
<div class="label">Referencia</div>
<div id="ref" class="value"></div>
</div>

</div>

<div class="priceBox">
<div class="label">Precio total</div>
<div id="price" class="priceValue"></div>
</div>

<a href="./index.html" class="btn">
Hacer otra reserva
</a>

<div class="footer">
Fun Republik · Sistema de reservas automático
</div>

</div>
</div>

<script>

function param(name){
return new URLSearchParams(window.location.search).get(name) || "";
}

function money(v){
return new Intl.NumberFormat("es-ES",{
style:"currency",
currency:"EUR",
maximumFractionDigits:0
}).format(Number(v||0));
}

document.getElementById("name").textContent = param("name");
document.getElementById("phone").textContent = param("phone");
document.getElementById("date").textContent = param("date");
document.getElementById("time").textContent = param("time")+" h";
document.getElementById("duration").textContent = param("duration")+" horas";
document.getElementById("boats").textContent = param("boats")+" barco(s)";
document.getElementById("pax").textContent = param("pax")+" personas";
document.getElementById("ref").textContent = param("hold_event_id");
document.getElementById("price").textContent = money(param("price"));

</script>

</body>
</html>
